services:
  its-gerencial-casan:
    build: .
    container_name: its-gerencial-casan
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  its-email-service:
    build: ./email-service
    container_name: its-email-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}

  its-api:
    build: ./api
    container_name: its-api
    restart: unless-stopped
    healthcheck:
      # /health e' liveness (nao toca o banco), entao o container fica saudavel
      # mesmo antes do Postgres estar pronto.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    environment:
      # DATABASE_URL = "Postgres URL (internal)" do recurso Postgres no Coolify.
      # Definir na aba Environment Variables do Coolify, NUNCA commitar no git.
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_SENHA=${ADMIN_SENHA}
